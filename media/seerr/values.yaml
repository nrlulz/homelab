pvc:
  pvcName: seerr-data
  storageRequest: 128Mi

global:
  createDefaultServiceAccount: false

app-template:
  defaultPodOptions:
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
  controllers:
    seerr:
      containers:
        seerr:
          image:
            repository: ghcr.io/seerr-team/seerr
            tag: v3.3.0@sha256:c92d2dc117f62185e7bcb88cd56efd374ea79210eaf433275449e8d5988eb5a8
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
  service:
    seerr:
      controller: seerr
      ports:
        http:
          port: 5055
  ingress:
    seerr:
      className: external
      hosts:
        - host: requests.neils.house
          paths:
            - path: /
              service:
                identifier: seerr
                port: http
  persistence:
    config:
      existingClaim: seerr-data
      globalMounts:
        - path: /app/config
