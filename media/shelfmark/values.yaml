oauth2-proxy:
  ingress:
    className: &ingressClassName internal
    host: &ingressHost shelfmark.internal.neils.house
  oidc:
    clientID: ba641629-ab41-4013-a59b-82ea4a56db32
    clientSecretKey: SHELFMARK_OPENID_CLIENT_SECRET
    cookieSecretKey: SHELFMARK_OPENID_COOKIE_SECRET

pvc:
  pvcName: shelfmark-data
  storageRequest: 128Mi
  moverSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

global:
  createDefaultServiceAccount: false

app-template:
  controllers:
    shelfmark:
      containers:
        shelfmark:
          image:
            repository: ghcr.io/calibrain/shelfmark
            tag: v1.3.0@sha256:e891eda444b261da48a839db652034bce4e20ac09c167f14adf939dedf96b572
          probes:
            liveness:
              enabled: true
            readiness:
              enabled: true
          env:
            PUID: "1000"
            PGID: "1000"
  service:
    shelfmark:
      controller: shelfmark
      ports:
        http:
          port: 8084
  ingress:
    shelfmark:
      annotations:
        nginx.ingress.kubernetes.io/auth-url: "https://$host/oauth2/auth"
        nginx.ingress.kubernetes.io/auth-signin: "https://$host/oauth2/start?rd=$escaped_request_uri"
      className: *ingressClassName
      hosts:
        - host: *ingressHost
          paths:
            - path: /
              service:
                identifier: shelfmark
                port: http
  persistence:
    books:
      existingClaim: calibre-ingest
    config:
      existingClaim: shelfmark-data

